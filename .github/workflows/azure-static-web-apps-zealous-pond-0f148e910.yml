name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - master
  workflow_dispatch:

jobs:
  build_and_deploy_job:
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Angular App
    concurrency:
      group: swa-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '16'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      # ---------- 🔎 DIAGNOSTICS ----------
      - name: Show Git ref and workflows
        run: |
          echo "HEAD SHA: $GITHUB_SHA"
          git log -1 --name-status
          ls -la .github/workflows || true

      - name: Show firebase from package.json
        run: |
          node -v
          npm -v
          echo "firebase (package.json):"
          node -p "require('./package.json').dependencies && require('./package.json').dependencies.firebase"

      - name: Ensure no native grpc in lockfile (must be false)
        run: |
          node -e "const l=require('./package-lock.json');let found=false;
          function walk(d){if(!d||!d.dependencies)return;for(const [k,v] of Object.entries(d.dependencies)){if(k==='grpc'){found=true;break;}walk(v)}}
          walk(l); console.log('native grpc present:', found); if(found){process.exit(1)}"

      - name: Check for @grpc/grpc-js (expected)
        run: |
          node -e "const l=require('./package-lock.json');let found=false;
          function walk(d){if(!d||!d.dependencies)return;for(const [k,v] of Object.entries(d.dependencies)){if(k==='@grpc/grpc-js'){found=true;}walk(v)}}
          walk(l); console.log('@grpc/grpc-js present:', found);"

      - name: List deps that reference grpc (if any)
        run: |
          npm ls grpc || true
      # ------------------------------------

      - name: Install Dependencies (lockfile-exact)
        run: npm ci --legacy-peer-deps

      - name: Build Angular App
        run: npm run build --if-present

      # 🚀 Upload the prebuilt app and bypass Oryx build (avoids Node 22/OpenSSL 3)
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ZEALOUS_POND_0F148E910 }}
          action: "upload"
          app_location: "dist/ShopWeb"   # <-- upload the CI-built output
          output_location: ""            # <-- not used when skip_app_build is true
          skip_app_build: true           # <-- CRITICAL: do not let Oryx build
