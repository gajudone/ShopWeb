name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - master
  # You can keep PR triggers if you want to redeploy on PR merges,
  # but we are not building anything here.
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - master

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Deploy prebuilt app (skip build)
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Deploy prebuilt app
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ZEALOUS_POND_0F148E910 }}
          action: "upload"
          app_location: "dist/ShopWeb"   # PUBLISH THE BUILT FOLDER
          output_location: ""            # not used when uploading prebuilt assets
          skip_app_build: true           # CRITICAL: DO NOT RUN npm/ng BUILD IN CI

  # (Optional) Keep your close pull request job if it exists in a separate block
